<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résolveur d'Équations - Laboratoire Virtuel</title>
    
    <!-- Moteur de rendu MathJax (LaTeX) -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #64748b;
            --success-color: #16a34a;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #1e293b;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 550px;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-top: 6px solid var(--primary-color);
        }

        h1 {
            color: var(--primary-color);
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .equation-box {
            background: #f8fafc;
            padding: 1.5rem;
            border-radius: 0.75rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            border: 1px solid #e2e8f0;
        }

        input {
            width: 60px;
            padding: 8px;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            text-align: center;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        #resultat {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            display: none;
            line-height: 1.6;
        }

        .step {
            margin-bottom: 10px;
            padding-left: 10px;
            border-left: 3px solid var(--primary-color);
        }

        .final-answer {
            margin-top: 15px;
            padding: 10px;
            background-color: #dcfce7;
            color: #166534;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .error {
            color: #dc2626;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="../simulations.html" style="display:inline-block;margin-bottom:16px;font-size:.85em;color:#6e7781;text-decoration:none">← Retour aux simulations</a>
    <h1>Résolveur d'Équations</h1>
    
    <div class="equation-box">
        <input type="number" id="inputA" value="2" step="any">
        <span>\( x + \)</span>
        <input type="number" id="inputB" value="4" step="any">
        <span>\( = \)</span>
        <input type="number" id="inputC" value="10" step="any">
    </div>

    <button onclick="resoudreEquation()">Calculer la solution</button>

    <div id="resultat"></div>
</div>

<script>
    function resoudreEquation() {
        const a = parseFloat(document.getElementById('inputA').value);
        const b = parseFloat(document.getElementById('inputB').value);
        const c = parseFloat(document.getElementById('inputC').value);
        const resDiv = document.getElementById('resultat');

        // Réinitialisation
        resDiv.innerHTML = "";
        resDiv.style.display = "block";

        if (isNaN(a) || isNaN(b) || isNaN(c)) {
            resDiv.innerHTML = "<p class='error'>Erreur : Veuillez entrer des nombres valides.</p>";
            return;
        }

        if (a === 0) {
            if (b === c) {
                resDiv.innerHTML = "<p>L'équation est de la forme \( 0x + ${b} = ${c} \).<br><strong>Une infinité de solutions.</strong></p>";
            } else {
                resDiv.innerHTML = "<p class='error'>L'équation \( 0x + ${b} = ${c} \) est impossible.<br><strong>Aucune solution.</strong></p>";
            }
            MathJax.typeset();
            return;
        }

        // Calcul des étapes
        const bAffiche = b >= 0 ? `+ ${b}` : `- ${Math.abs(b)}`;
        const operationInverse = b >= 0 ? "-" : "+";
        const absB = Math.abs(b);
        const reste = c - b;
        const solution = reste / a;

        let html = "<strong>Étapes de résolution :</strong><br><br>";

        // Étape 1
        html += `<div class="step">
            1. On soustrait \( ${b} \) des deux côtés :<br>
            \( ${a}x = ${c} ${operationInverse} ${absB} \)<br>
            \( ${a}x = ${reste} \)
        </div>`;

        // Étape 2
        html += `<div class="step">
            2. On divise par \( ${a} \) :<br>
            \( x = \\frac{${reste}}{${a}} \)
        </div>`;

        // Résultat final
        const solFormatee = Number.isInteger(solution) ? solution : solution.toFixed(3);
        html += `<div class="final-answer">La solution est \( x = ${solFormatee} \)</div>`;

        resDiv.innerHTML = html;

        // Demander à MathJax de retraiter le nouveau contenu HTML
        if (window.MathJax) {
            MathJax.typesetPromise([resDiv]);
        }
    }
</script>

<script src="/nav.js"></script>
</body>
</html>
