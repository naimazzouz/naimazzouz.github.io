<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loi d'Ohm - Laboratoire Virtuel Multi-Séries</title>
    
    <!-- Moteur de rendu MathJax (LaTeX) -->
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- Chart.js pour le graphique -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #e91e63; 
            --secondary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-muted: #64748b;
            --wire: #334155;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .btn-back { position: absolute; left: 15px; top: 15px; background: rgba(255,255,255,0.2); color: white; text-decoration: none; padding: 5px 12px; border-radius: 5px; font-size: 0.85em; }
        .btn-back:hover { color: #fff; background: rgba(255,255,255,0.35); }

        .container {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 20px;
            max-width: 1300px;
            width: 100%;
            animation: fadeIn 0.6s ease-out;
        }

        @media (max-width: 1000px) {
            .container { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card);
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border-top: 5px solid var(--primary);
        }

        h2 { color: var(--primary); margin-top: 0; font-size: 1.3rem; display: flex; align-items: center; gap: 10px; }

        .schematic-container {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 20px;
        }

        .electron { fill: #fbbf24; visibility: hidden; }
        .label-val { font-weight: bold; font-size: 14px; fill: var(--secondary); transition: all 0.2s; }

        .controls { display: flex; flex-direction: column; gap: 15px; }

        .slider-group { display: flex; flex-direction: column; gap: 5px; }

        .slider-header {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .btn-action {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-save { background: var(--secondary); width: 100%; }
        .btn-save:hover { filter: brightness(1.1); transform: translateY(-1px); }

        .table-container {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-top: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th, td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }

        th { background: #f1f5f9; position: sticky; top: 0; }

        .color-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }
    </style>
<body>

    <a href="../simulations.html" class="btn-back">← Retour au labo de simulations</a>

    <h1 style="color: var(--primary); margin-bottom: 8px; text-align: center;">⚡ Labo Ohm : Caractéristiques U = f(I)</h1>
    <p style="margin:0 0 20px 0;opacity:0.85;text-align:center;color:var(--text-muted);">2nde Bac Pro &middot; Ch03 &middot; Loi d&apos;Ohm &mdash; U = R &times; I</p>

    <div class="container">
        
        <!-- Panneau de Gauche : Simulation -->
        <div class="card">
            <h2>Circuit & Réglages</h2>
            <div class="schematic-container">
                <svg aria-label="Schéma du circuit électrique avec résistance, ampèremètre et voltmètre" viewBox="0 0 300 200" width="100%">
                    <path id="electron-path" d="M 50 100 L 50 50 L 250 50 L 250 150 L 50 150 L 50 100" fill="none" />
                    <path d="M 50 150 L 50 50 L 250 50 L 250 150 L 50 150" stroke="var(--wire)" stroke-width="2" fill="none" />
                    
                    <!-- Electrons -->
                    <circle class="electron" r="3"><animateMotion id="anim1" dur="2s" repeatCount="indefinite"><mpath href="#electron-path"/></animateMotion></circle>
                    <circle class="electron" r="3"><animateMotion id="anim2" dur="2s" repeatCount="indefinite" begin="0.5s"><mpath href="#electron-path"/></animateMotion></circle>
                    <circle class="electron" r="3"><animateMotion id="anim3" dur="2s" repeatCount="indefinite" begin="1s"><mpath href="#electron-path"/></animateMotion></circle>
                    
                    <!-- Composants -->
                    <circle cx="50" cy="100" r="20" fill="white" stroke="var(--wire)" stroke-width="2" />
                    <text x="42" y="105" font-size="12">G</text>
                    <text x="30" y="70" class="label-val" id="val-u">0V</text>

                    <circle cx="150" cy="50" r="15" fill="white" stroke="var(--wire)" stroke-width="2" />
                    <text x="144" y="55" font-size="10">A</text>
                    <text x="135" y="30" class="label-val" id="val-i">0A</text>

                    <rect x="225" y="85" width="50" height="30" fill="white" stroke="var(--wire)" stroke-width="2" />
                    <text x="230" y="75" class="label-val" id="val-r" fill="var(--primary) !important">0Ω</text>
                </svg>
            </div>

            <div class="controls">
                <div class="slider-group">
                    <div class="slider-header">
                        <span>Tension (U)</span>
                        <span id="label-u-slider">12.0 V</span>
                    </div>
                    <input type="range" id="slider-u" min="0" max="30" step="0.5" value="12" oninput="updateCalcul()">
                </div>

                <div class="slider-group">
                    <div class="slider-header">
                        <span>Résistance (R)</span>
                        <span id="label-r-slider">100 Ω</span>
                    </div>
                    <input type="range" id="slider-r" min="10" max="1000" step="10" value="100" oninput="updateCalcul()">
                </div>

                <button class="btn-action btn-save" onclick="saveMeasure()">
                    <span>📥 Enregistrer cette mesure</span>
                </button>
            </div>
        </div>

        <!-- Panneau de Droite : Graphique & Table -->
        <div class="card" style="border-top-color: var(--secondary);">
            <h2>Graphique dynamique</h2>
            <canvas aria-label="Caractéristiques U = f(I) tracées pour différentes résistances" id="ohmChart" height="180"></canvas>
            
            <h2 style="margin-top:20px; font-size: 1.1rem;">Registre des mesures</h2>
            <div class="table-container">
                <table id="measureTable">
                    <thead>
                        <tr>
                            <th>Série</th>
                            <th>U (V)</th>
                            <th>I (mA)</th>
                            <th>R (Ω)</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn-action" style="background:#64748b; font-size:0.8rem; padding: 8px; width: auto;" onclick="clearMeasures()">Réinitialiser le labo</button>
            </div>
        </div>

    </div>

    <script>
        let chart;
        const colors = ['#e91e63', '#2563eb', '#16a34a', '#8b5cf6', '#f59e0b', '#06b6d4'];
        let colorIndex = 0;

        function initChart() {
            const ctx = document.getElementById('ohmChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'scatter',
                data: { datasets: [] },
                options: {
                    responsive: true,
                    scales: {
                        x: { 
                            title: { display: true, text: 'Intensité I (mA)' }, 
                            min: 0,
                            grid: { color: '#e2e8f0' }
                        },
                        y: { 
                            title: { display: true, text: 'Tension U (V)' }, 
                            min: 0,
                            grid: { color: '#e2e8f0' }
                        }
                    },
                    plugins: {
                        legend: { display: true, position: 'top', labels: { boxWidth: 12 } }
                    }
                }
            });
        }

        function updateCalcul() {
            const u = parseFloat(document.getElementById('slider-u').value);
            const r = parseFloat(document.getElementById('slider-r').value);
            const i = u / r;

            document.getElementById('label-u-slider').innerText = u.toFixed(1) + " V";
            document.getElementById('label-r-slider').innerText = r + " Ω";
            
            document.getElementById('val-u').textContent = u.toFixed(1) + " V";
            document.getElementById('val-r').textContent = r + " Ω";
            document.getElementById('val-i').textContent = (i < 1 ? (i * 1000).toFixed(1) + " mA" : i.toFixed(2) + " A");

            const electrons = document.querySelectorAll('.electron');
            const anims = [document.getElementById('anim1'), document.getElementById('anim2'), document.getElementById('anim3')];
            
            if (i > 0) {
                electrons.forEach(el => el.style.visibility = 'visible');
                let speed = Math.max(0.1, 2 / (i * 10 + 0.1)); 
                speed = Math.min(5, speed);
                anims.forEach(a => a.setAttribute('dur', speed + 's'));
            } else {
                electrons.forEach(el => el.style.visibility = 'hidden');
            }
        }

        function saveMeasure() {
            const u = parseFloat(document.getElementById('slider-u').value);
            const r = parseFloat(document.getElementById('slider-r').value);
            const i_ma = parseFloat(((u / r) * 1000).toFixed(1));

            // Trouver ou créer le dataset pour cette résistance spécifique
            let label = `Série R = ${r} Ω`;
            let dataset = chart.data.datasets.find(ds => ds.label === label);

            if (!dataset) {
                const color = colors[colorIndex % colors.length];
                colorIndex++;
                dataset = {
                    label: label,
                    data: [],
                    backgroundColor: color,
                    borderColor: color,
                    showLine: true,
                    tension: 0,
                    pointRadius: 5
                };
                chart.data.datasets.push(dataset);
            }

            dataset.data.push({ x: i_ma, y: u });
            dataset.data.sort((a, b) => a.x - b.x);
            chart.update();

            // Ajouter à la table
            const tbody = document.querySelector('#measureTable tbody');
            const row = tbody.insertRow(0);
            const colorCircle = `<span class="color-dot" style="background:${dataset.borderColor}"></span>`;
            row.innerHTML = `<td>${colorCircle} R=${r}</td><td>${u.toFixed(1)}</td><td>${i_ma}</td><td>${r}</td>`;
        }

        function clearMeasures() {
            chart.data.datasets = [];
            colorIndex = 0;
            chart.update();
            document.querySelector('#measureTable tbody').innerHTML = "";
        }

        window.onload = () => {
            initChart();
            updateCalcul();
        };
    </script>
</body>
</html>
