<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Générateur de lettre de motivation – Bac Pro ICCER</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f7fa;
      color: #1e293b;
      line-height: 1.6;
    }
    nav {
      background: #1e3a5f;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    nav ul { list-style: none; display: flex; max-width: 960px; margin: 0 auto; }
    nav a {
      display: block; padding: 14px 22px; color: #cbd5e1;
      text-decoration: none; font-weight: 600; font-size: .95rem;
      transition: background .2s, color .2s;
    }
    nav a:hover, nav a.active { background: #2563eb; color: #fff; }
    header {
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
      color: #fff; text-align: center; padding: 40px 20px 32px;
    }
    header h1 {
      font-size: clamp(1.3rem, 3.5vw, 2rem);
      font-weight: 800; margin-bottom: 6px;
    }
    header p { font-size: .95rem; opacity: .85; }

    main { max-width: 900px; margin: 0 auto; padding: 28px 16px 64px; }

    /* ── Context selector ── */
    .context-selector {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px; margin-bottom: 24px;
    }
    .ctx-btn {
      padding: 16px 14px;
      background: #fff;
      border: 2.5px solid #e2e8f0;
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
      transition: border-color .2s, box-shadow .2s;
    }
    .ctx-btn:hover { border-color: #93c5fd; }
    .ctx-btn.active { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
    .ctx-icon { font-size: 1.6rem; margin-bottom: 6px; }
    .ctx-title { font-weight: 700; font-size: .92rem; color: #1e3a5f; margin-bottom: 2px; }
    .ctx-desc { font-size: .75rem; color: #64748b; }

    /* ── Mode selector ── */
    .mode-selector {
      display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .mode-btn {
      flex: 1; min-width: 200px;
      padding: 18px 20px;
      background: #fff;
      border: 2.5px solid #e2e8f0;
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      transition: border-color .2s, box-shadow .2s;
    }
    .mode-btn:hover { border-color: #93c5fd; }
    .mode-btn.active { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
    .mode-btn-title { font-weight: 700; font-size: 1rem; color: #1e3a5f; margin-bottom: 4px; }
    .mode-btn-desc { font-size: .82rem; color: #64748b; }

    /* ── Sections ── */
    .form-section {
      background: #fff; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      padding: 24px; margin-bottom: 20px;
    }
    .form-section h2 {
      font-size: 1.05rem; font-weight: 700; color: #1e3a5f;
      border-left: 4px solid #2563eb; padding-left: 12px; margin-bottom: 16px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    .form-group { display: flex; flex-direction: column; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label {
      font-size: .82rem; font-weight: 600; color: #475569; margin-bottom: 4px;
    }
    .form-group input, .form-group select, .form-group textarea {
      padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 7px;
      font-size: .92rem; font-family: inherit; transition: border-color .2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    .form-group textarea { min-height: 80px; resize: vertical; }
    .form-hint { font-size: .76rem; color: #94a3b8; margin-top: 3px; }

    /* ── Guided steps ── */
    .step-indicator {
      display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .step-dot {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .82rem; font-weight: 700;
      background: #e2e8f0; color: #64748b;
      transition: background .2s, color .2s;
    }
    .step-dot.active { background: #2563eb; color: #fff; }
    .step-dot.done { background: #16a34a; color: #fff; }

    .step-panel { display: none; }
    .step-panel.active { display: block; }

    .step-nav { display: flex; gap: 12px; margin-top: 18px; }

    /* ── Template mode ── */
    .template-area {
      min-height: 300px; line-height: 1.8; font-size: .92rem;
    }
    .template-area .tpl-blank {
      display: inline-block;
      border-bottom: 2px solid #2563eb;
      min-width: 150px;
      padding: 2px 6px;
      margin: 0 2px;
      color: #2563eb;
      font-weight: 600;
      background: #eff6ff;
      border-radius: 3px;
      font-family: inherit;
      font-size: .9rem;
    }
    .template-area .tpl-blank:focus {
      outline: none;
      border-color: #1d4ed8;
      box-shadow: 0 0 0 3px rgba(37,99,235,.15);
    }
    .template-area .tpl-blank::placeholder { color: #93c5fd; font-weight: 400; }

    /* ── Buttons ── */
    .btn-primary, .btn-secondary {
      padding: 11px 24px; border-radius: 7px;
      font-weight: 700; font-size: .92rem;
      cursor: pointer; border: none;
      transition: background .2s, transform .1s;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
    .btn-secondary { background: #f1f5f9; color: #475569; border: 1.5px solid #e2e8f0; }
    .btn-secondary:hover { background: #e2e8f0; }

    /* ── Preview / Output ── */
    #output-zone { display: none; }
    #output-zone.visible { display: block; }
    .letter-preview {
      background: #fff; border: 2px solid #1e3a5f; border-radius: 4px;
      padding: 32px 36px; margin-bottom: 20px; font-size: .92rem;
      line-height: 1.8; white-space: pre-wrap;
      font-family: 'Georgia', 'Times New Roman', serif;
    }
    .letter-preview p { margin-bottom: 12px; }

    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 18px; }

    .tips-box {
      background: #eff6ff; border: 1.5px solid #bfdbfe; border-radius: 8px;
      padding: 16px 20px; margin-bottom: 20px;
    }
    .tips-box h3 { font-size: .9rem; color: #1d4ed8; margin-bottom: 8px; }
    .tips-box ul { padding-left: 18px; font-size: .84rem; color: #334155; }
    .tips-box li { margin-bottom: 4px; }

    @media print {
      body { background: #fff; }
      nav, header, footer, .context-selector, .mode-selector, .btn-row, .tips-box,
      .step-indicator, .step-nav, #template-mode, #guided-mode { display: none !important; }
      main { padding: 0; max-width: 100%; }
      #output-zone, #output-zone .form-section { display: block !important; }
      #output-zone h2, #output-zone #char-count { display: none !important; }
      .letter-preview { border: none; padding: 20px; font-size: 11pt; box-shadow: none; }
      .form-section:not(#output-zone .form-section) { display: none !important; }
    }

    @media (max-width: 600px) {
      nav a { padding: 11px 13px; font-size: .82rem; }
      .form-section { padding: 16px; }
      .letter-preview { padding: 20px; }
      .context-selector { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <nav>
    <ul>
      <li><a href="index.html">Accueil</a></li>
      <li><a href="maths-term-iccer.html">Mathématiques</a></li>
      <li><a href="pc-term-iccer.html">Physique-Chimie</a></li>
      <li><a href="simulations.html">Simulations</a></li>
    </ul>
  </nav>

  <header>
    <h1 id="page-title">Générateur de lettre de motivation</h1>
    <p id="page-subtitle">Bac Pro ICCER – Crée ta lettre de motivation en quelques minutes</p>
  </header>

  <main>

    <!-- ── Choix du contexte ── -->
    <div class="context-selector" id="context-selector">
      <button class="ctx-btn active" onclick="switchContext('parcoursup')">
        <div class="ctx-icon">🎓</div>
        <div class="ctx-title">Parcoursup</div>
        <div class="ctx-desc">Poursuite d'études (BTS, MC...)</div>
      </button>
      <button class="ctx-btn" onclick="switchContext('emploi')">
        <div class="ctx-icon">💼</div>
        <div class="ctx-title">Emploi</div>
        <div class="ctx-desc">Recherche d'un premier emploi</div>
      </button>
      <button class="ctx-btn" onclick="switchContext('stage')">
        <div class="ctx-icon">🔧</div>
        <div class="ctx-title">Stage</div>
        <div class="ctx-desc">Stage en entreprise (PFMP)</div>
      </button>
      <button class="ctx-btn" onclick="switchContext('alternance')">
        <div class="ctx-icon">📋</div>
        <div class="ctx-title">Alternance</div>
        <div class="ctx-desc">Contrat d'apprentissage</div>
      </button>
    </div>

    <!-- ── Conseils ── -->
    <div class="tips-box" id="tips-box"></div>

    <!-- ── Mode Selector ── -->
    <div class="mode-selector">
      <button class="mode-btn active" onclick="switchMode('guided')" id="btn-mode-guided">
        <div class="mode-btn-title">Mode guidé</div>
        <div class="mode-btn-desc">Réponds à des questions simples, la lettre se construit automatiquement.</div>
      </button>
      <button class="mode-btn" onclick="switchMode('template')" id="btn-mode-template">
        <div class="mode-btn-title">Modèle à compléter</div>
        <div class="mode-btn-desc">Complète directement les champs d'une lettre pré-rédigée.</div>
      </button>
    </div>

    <!-- ══════════════════════════════════════════════════ -->
    <!--  MODE GUIDÉ                                        -->
    <!-- ══════════════════════════════════════════════════ -->
    <div id="guided-mode"></div>

    <!-- ══════════════════════════════════════════════════ -->
    <!--  MODE MODÈLE À COMPLÉTER                           -->
    <!-- ══════════════════════════════════════════════════ -->
    <div id="template-mode" style="display:none;"></div>

    <!-- ══════════════════════════════════════════════════ -->
    <!--  APERÇU FINAL                                     -->
    <!-- ══════════════════════════════════════════════════ -->
    <div id="output-zone">
      <div class="form-section">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <h2 style="margin-bottom:0;">Aperçu de ta lettre</h2>
          <span id="char-count" style="font-size:.82rem;color:#64748b;background:#f1f5f9;padding:4px 14px;border-radius:20px;"></span>
        </div>
        <div class="letter-preview" id="letter-output"></div>
        <div class="btn-row">
          <button class="btn-primary" onclick="copierLettre()">Copier le texte</button>
          <button class="btn-primary" onclick="window.print()">Imprimer / PDF</button>
          <button class="btn-primary" onclick="telechargerWord()">Télécharger Word</button>
          <button class="btn-secondary" onclick="telechargerTxt()">Télécharger .txt</button>
          <button class="btn-secondary" onclick="modifierLettre()">Modifier</button>
        </div>
      </div>
    </div>

  </main>

  <footer style="background:#1e3a5f;color:#94a3b8;text-align:center;padding:18px;font-size:.8rem;">
    <p>Maths – Sciences en LP &mdash; M. Azzouz &mdash; Lycée Eugène Hénaff &mdash; Académie de Créteil</p>
  </footer>

  <script>
    var currentStep = 1;
    var currentMode = 'guided';
    var currentContext = 'parcoursup';

    /* ══════════════════════════════════════════════════════
       DONNÉES PAR CONTEXTE
       ══════════════════════════════════════════════════════ */
    var CTX = {
      parcoursup: {
        charLimit: 1500,
        fileName: 'lettre-motivation-parcoursup',
        tips: [
          'Sois <strong>sincère</strong> et <strong>concret</strong> : donne des exemples précis tirés de tes expériences.',
          'Montre que tu connais la formation visée et explique <strong>pourquoi elle te correspond</strong>.',
          'Mets en avant tes <strong>stages PFMP</strong>, projets d\'atelier et compétences acquises en bac pro ICCER.',
          'La lettre Parcoursup est limitée à <strong>1 500 caractères</strong> (espaces compris).',
          'Relis-toi plusieurs fois et fais relire par un adulte.'
        ],
        steps: [
          {
            title: 'Étape 1 – Qui es-tu ?',
            fields: [
              { id: 'g-prenom', label: 'Prénom', placeholder: 'Ton prénom', full: false },
              { id: 'g-nom', label: 'Nom', placeholder: 'Ton nom', full: false },
              { id: 'g-classe', label: 'Classe actuelle', placeholder: 'Ex : Terminale Bac Pro ICCER', full: false },
              { id: 'g-lycee', label: 'Lycée', placeholder: 'Ex : Lycée Eugène Hénaff, Bagnolet', full: false }
            ]
          },
          {
            title: 'Étape 2 – Quelle formation vises-tu ?',
            fields: [
              { id: 'g-formation', label: 'Nom de la formation', placeholder: 'Ex : BTS FED (Fluides Énergies Domotique), MC Technicien en énergies renouvelables...' },
              { id: 'g-etablissement', label: 'Établissement visé', placeholder: 'Ex : Lycée Diderot, Paris' },
              { id: 'g-pourquoi', label: 'Pourquoi cette formation t\'intéresse ?', placeholder: 'Ex : Pendant mes stages, j\'ai découvert l\'installation de pompes à chaleur et je souhaite approfondir mes connaissances en génie climatique...', type: 'textarea', full: true, hint: 'Explique ce qui t\'attire et pourquoi ça correspond à ton projet.' }
            ]
          },
          {
            title: 'Étape 3 – Tes expériences',
            fields: [
              { id: 'g-stages', label: 'Tes stages PFMP et expériences', placeholder: 'Ex : J\'ai effectué 22 semaines de stage, notamment chez Daikin où j\'ai installé des systèmes de climatisation, et chez Engie où j\'ai participé à la mise en service de chaudières...', type: 'textarea', full: true, hint: 'Décris tes stages (entreprise, durée, ce que tu as fait et appris).' },
              { id: 'g-projets', label: 'Projets scolaires ou personnels en lien', placeholder: 'Ex : En atelier, j\'ai réalisé l\'installation complète d\'un circuit de chauffage avec plancher chauffant...', type: 'textarea', full: true, hint: 'Projets réalisés en atelier ou centres d\'intérêt en lien.' }
            ]
          },
          {
            title: 'Étape 4 – Tes qualités et compétences',
            fields: [
              { id: 'g-qualites', label: 'Tes qualités principales', placeholder: 'Ex : Je suis rigoureux et méthodique, j\'aime le travail en équipe sur chantier, je suis autonome...', type: 'textarea', full: true, hint: 'Cite 2-3 qualités avec un exemple concret si possible.' },
              { id: 'g-competences', label: 'Compétences techniques acquises en ICCER', placeholder: 'Ex : Installation de systèmes de chauffage et climatisation, raccordements fluidiques et électriques, mise en service, lecture de plans, utilisation d\'appareils de mesure...', type: 'textarea', full: true }
            ]
          },
          {
            title: 'Étape 5 – Ton projet professionnel',
            fields: [
              { id: 'g-projet-pro', label: 'Ton projet après cette formation', placeholder: 'Ex : Je souhaite devenir technicien en génie climatique spécialisé en énergies renouvelables, puis évoluer vers un poste de chef d\'équipe...', type: 'textarea', full: true, hint: 'Décris ton objectif (métier visé, poursuite d\'études...).' }
            ]
          }
        ],
        generate: function() {
          var p = val('g-prenom'), n = val('g-nom'), cl = val('g-classe'), ly = val('g-lycee');
          var form = val('g-formation'), etab = val('g-etablissement'), pq = val('g-pourquoi');
          var st = val('g-stages'), pr = val('g-projets'), qu = val('g-qualites');
          var comp = val('g-competences'), pp = val('g-projet-pro');
          if (!p || !form) { alert('Remplis au moins ton prénom et le nom de la formation.'); return null; }
          var t = 'Objet : Candidature en ' + form;
          if (etab) t += ' – ' + etab;
          t += '\n\nMadame, Monsieur,\n\n';
          t += 'Actuellement en ' + (cl || 'terminale bac professionnel ICCER');
          if (ly) t += ' au lycée ' + ly;
          t += ', je me permets de vous soumettre ma candidature pour intégrer votre formation en ' + form + '.\n\n';
          if (pq) t += endDot(pq) + '\n\n';
          if (st) t += endDot(st) + '\n\n';
          if (pr) t += endDot(pr) + '\n\n';
          if (qu || comp) {
            var q = '';
            if (qu) q += qu;
            if (comp) { if (q) q += ' De plus, j\'ai acquis des compétences techniques : '; q += comp; }
            t += endDot(q) + '\n\n';
          }
          if (pp) t += 'À terme, ' + endDot(pp) + ' Votre formation constitue une étape essentielle pour y parvenir.\n\n';
          t += 'Je reste à votre disposition pour tout entretien complémentaire et vous prie d\'agréer, Madame, Monsieur, l\'expression de mes salutations distinguées.\n\n';
          t += p + ' ' + n.toUpperCase();
          return t;
        },
        template: function() {
          return '<p>Objet : Candidature en <input class="tpl-blank" type="text" placeholder="nom de la formation (ex : BTS FED)" style="width:260px"> au sein de <input class="tpl-blank" type="text" placeholder="nom de l\'établissement" style="width:220px"></p>'
            + '<p>Madame, Monsieur,</p>'
            + '<p>Actuellement en <input class="tpl-blank" type="text" placeholder="classe actuelle (ex : Terminale Bac Pro ICCER)" style="width:280px"> au lycée <input class="tpl-blank" type="text" placeholder="nom du lycée" style="width:200px">, je me permets de vous soumettre ma candidature pour intégrer votre formation en <input class="tpl-blank" type="text" placeholder="nom de la formation" style="width:220px">.</p>'
            + '<p>Cette formation m\'intéresse particulièrement car <input class="tpl-blank" type="text" placeholder="raisons de ton intérêt (lien avec tes stages, le génie climatique, les EnR...)" style="width:100%">.</p>'
            + '<p>Au cours de ma formation en bac pro ICCER, j\'ai effectué plusieurs stages (PFMP) notamment chez <input class="tpl-blank" type="text" placeholder="nom de l\'entreprise" style="width:180px"> où j\'ai pu <input class="tpl-blank" type="text" placeholder="décrire ce que tu as fait (installation, mise en service, raccordements...)" style="width:100%">. Ces expériences ont confirmé mon intérêt pour ce domaine.</p>'
            + '<p>Mes atouts pour réussir sont <input class="tpl-blank" type="text" placeholder="tes qualités (rigueur, autonomie, esprit d\'équipe...)" style="width:100%">. J\'ai également acquis des compétences techniques telles que <input class="tpl-blank" type="text" placeholder="compétences (installation chauffage/clim, lecture de plans, raccordements...)" style="width:100%">.</p>'
            + '<p>À terme, mon projet professionnel est de <input class="tpl-blank" type="text" placeholder="ton projet (devenir technicien en génie climatique, chef d\'équipe...)" style="width:100%">. Votre formation constitue une étape essentielle pour y parvenir.</p>'
            + '<p>Je reste à votre disposition pour tout entretien complémentaire et vous prie d\'agréer, Madame, Monsieur, l\'expression de mes salutations distinguées.</p>'
            + '<p><input class="tpl-blank" type="text" placeholder="Prénom NOM" style="width:200px"></p>';
        }
      },

      emploi: {
        charLimit: 0,
        fileName: 'lettre-motivation-emploi',
        tips: [
          'Adresse ta lettre à <strong>une entreprise précise</strong>, pas une lettre générique.',
          'Mets en avant tes <strong>22 semaines de stages PFMP</strong> et les compétences concrètes acquises.',
          'Parle des <strong>compétences ICCER</strong> : installation chauffage/clim, raccordements, mise en service, énergies renouvelables.',
          'Montre ta <strong>motivation pour le terrain</strong> : tu es opérationnel et prêt à travailler.',
          'N\'oublie pas de mentionner tes <strong>habilitations</strong> (électrique, manipulation de fluides frigorigènes...) si tu les as.',
          'Relis-toi et fais relire par un adulte avant d\'envoyer.'
        ],
        steps: [
          {
            title: 'Étape 1 – Tes coordonnées',
            fields: [
              { id: 'g-prenom', label: 'Prénom', placeholder: 'Ton prénom' },
              { id: 'g-nom', label: 'Nom', placeholder: 'Ton nom' },
              { id: 'g-adresse', label: 'Adresse', placeholder: 'Ex : 12 rue des Lilas, 93100 Bagnolet', full: true },
              { id: 'g-telephone', label: 'Téléphone', placeholder: 'Ex : 06 12 34 56 78' },
              { id: 'g-email', label: 'Email', placeholder: 'Ex : prenom.nom@email.fr' }
            ]
          },
          {
            title: 'Étape 2 – L\'entreprise et le poste visé',
            fields: [
              { id: 'g-entreprise', label: 'Nom de l\'entreprise', placeholder: 'Ex : Daikin, Engie, Atlantic, artisan local...' },
              { id: 'g-poste', label: 'Poste recherché', placeholder: 'Ex : Installateur en chauffage et climatisation, Technicien CVC...' },
              { id: 'g-pourquoi', label: 'Pourquoi cette entreprise ?', placeholder: 'Ex : Votre entreprise est spécialisée dans l\'installation de pompes à chaleur et je souhaite m\'investir dans ce secteur en plein essor...', type: 'textarea', full: true, hint: 'Montre que tu connais l\'entreprise et son activité.' }
            ]
          },
          {
            title: 'Étape 3 – Ta formation et tes stages',
            fields: [
              { id: 'g-stages', label: 'Tes stages PFMP et expériences', placeholder: 'Ex : Lors de mes PFMP, j\'ai travaillé chez Engie Cofely où j\'ai installé des systèmes de chauffage collectif, réalisé des raccordements fluidiques et participé à la mise en service d\'une PAC air/eau...', type: 'textarea', full: true, hint: 'Décris tes expériences les plus pertinentes pour le poste.' },
              { id: 'g-projets', label: 'Réalisations en atelier', placeholder: 'Ex : Installation complète d\'un circuit de chauffage avec chaudière gaz et radiateurs, mise en service d\'une climatisation split...', type: 'textarea', full: true }
            ]
          },
          {
            title: 'Étape 4 – Tes compétences et qualités',
            fields: [

    function val(id) {
      var el = document.getElementById(id);
      return el ? el.value.trim() : '';

    function endDot(s) {
      s = s.trim();
      if (s && s.charAt(s.length - 1) !== '.') s += '.';
      return s;
    }

    /* ── Changement de contexte ── */
    function switchContext(ctx) {
      currentContext = ctx;
      var btns = document.querySelectorAll('.ctx-btn');
      var keys = ['parcoursup', 'emploi', 'stage', 'alternance'];
      for (var i = 0; i < btns.length; i++) {
        btns[i].classList.toggle('active', keys[i] === ctx);
      }
      document.getElementById('output-zone').classList.remove('visible');
      buildTips();
      buildGuided();
      buildTemplate();
      currentStep = 1;
      switchMode(currentMode);
    }

    /* ── Conseils ── */
    function buildTips() {
      var c = CTX[currentContext];
      var h = '<h3>Conseils pour ta lettre</h3><ul>';
      for (var i = 0; i < c.tips.length; i++) h += '<li>' + c.tips[i] + '</li>';
      h += '</ul>';
      document.getElementById('tips-box').innerHTML = h;
    }

    /* ── Construction du mode guidé ── */
    function buildGuided() {
      var c = CTX[currentContext];
      var steps = c.steps;
      var h = '<div class="step-indicator" id="step-indicator">';
      for (var i = 0; i < steps.length; i++) {
        h += '<div class="step-dot' + (i === 0 ? ' active' : '') + '" data-step="' + (i+1) + '">' + (i+1) + '</div>';
      }
      h += '</div>';
      for (var i = 0; i < steps.length; i++) {
        var s = steps[i];
        h += '<div class="step-panel' + (i === 0 ? ' active' : '') + '" id="step-' + (i+1) + '">';
        h += '<div class="form-section"><h2>' + s.title + '</h2><div class="form-grid">';
        for (var j = 0; j < s.fields.length; j++) {
          var f = s.fields[j];
          var cls = f.full ? ' full' : '';
          h += '<div class="form-group' + cls + '">';
          h += '<label for="' + f.id + '">' + f.label + '</label>';
          if (f.type === 'textarea') {
            h += '<textarea id="' + f.id + '" placeholder="' + f.placeholder + '"></textarea>';
          } else {
            h += '<input type="text" id="' + f.id + '" placeholder="' + f.placeholder + '">';
          }
          if (f.hint) h += '<span class="form-hint">' + f.hint + '</span>';
          h += '</div>';
        }
        h += '</div>';
        h += '<div class="step-nav">';
        if (i > 0) h += '<button class="btn-secondary" onclick="prevStep(' + i + ')">Précédent</button>';
        if (i < steps.length - 1) {
          h += '<button class="btn-primary" onclick="nextStep(' + (i+2) + ')">Suivant</button>';
        } else {
          h += '<button class="btn-primary" onclick="genererLettre()">Générer ma lettre</button>';
        }
        h += '</div></div></div>';
      }
      document.getElementById('guided-mode').innerHTML = h;
    }

      h += '<div id="char-count-tpl" style="font-size:.82rem;color:#64748b;margin-top:10px;"></div>';
      h += '<div class="btn-row">';
      h += '<button class="btn-primary" onclick="genererDepuisTemplate()">Aperçu de la lettre</button>';
      h += '<button class="btn-secondary" onclick="buildTemplate();switchMode(\'template\')">Réinitialiser</button>';
      h += '</div></div>';
      document.getElementById('template-mode').innerHTML = h;
      initTemplateCounter();
    }

    function initTemplateCounter() {
      var area = document.getElementById('template-area');
      if (!area) return;
      area.addEventListener('input', function() {
        var nodes = area.querySelectorAll('p');
        var text = '';
        for (var i = 0; i < nodes.length; i++) {
          var p = nodes[i];
          for (var j = 0; j < p.childNodes.length; j++) {
            var n = p.childNodes[j];
            if (n.nodeType === 3) text += n.textContent;
            else if (n.classList && n.classList.contains('tpl-blank')) text += n.value || '';
          }
          text += '\n\n';
        }
        var len = text.trim().length;
        var el = document.getElementById('char-count-tpl');
        var limit = CTX[currentContext].charLimit;
        if (limit) {
          el.textContent = len + ' / ' + limit.toLocaleString('fr-FR') + ' caractères';
          el.style.color = len > limit ? '#dc2626' : '#64748b';
        } else {
          el.textContent = len + ' caractères';
          el.style.color = '#64748b';
        }
      });
    }

    /* ── Modes ── */
    function switchMode(mode) {
      currentMode = mode;
      document.getElementById('guided-mode').style.display = mode === 'guided' ? '' : 'none';
      document.getElementById('template-mode').style.display = mode === 'template' ? '' : 'none';
      document.getElementById('btn-mode-guided').classList.toggle('active', mode === 'guided');
      document.getElementById('btn-mode-template').classList.toggle('active', mode === 'template');
      document.getElementById('output-zone').classList.remove('visible');
    }

    /* ── Navigation étapes ── */
    function goToStep(n) {
      currentStep = n;
      var panels = document.querySelectorAll('.step-panel');
      var dots = document.querySelectorAll('.step-dot');
      for (var i = 0; i < panels.length; i++) panels[i].classList.toggle('active', i === n - 1);
      for (var i = 0; i < dots.length; i++) {
        dots[i].classList.remove('active', 'done');
        if (i + 1 < n) dots[i].classList.add('done');
        if (i + 1 === n) dots[i].classList.add('active');
      }
    }
    function nextStep(n) { goToStep(n); }
    function prevStep(n) { goToStep(n); }

    /* ── Génération ── */
    function genererLettre() {
      var txt = CTX[currentContext].generate();
      if (txt) afficherLettre(txt);
    }

    function genererDepuisTemplate() {
      var nodes = document.getElementById('template-area').querySelectorAll('p');
      var text = '';
      for (var i = 0; i < nodes.length; i++) {
        var p = nodes[i];
        var line = '';
        for (var j = 0; j < p.childNodes.length; j++) {
          var n = p.childNodes[j];
          if (n.nodeType === 3) line += n.textContent;
          else if (n.classList && n.classList.contains('tpl-blank')) line += n.value || n.placeholder;
        }
        text += line.trim() + '\n\n';
      }
      afficherLettre(text.trim());
    }

    function afficherLettre(txt) {
      var el = document.getElementById('letter-output');
      el.textContent = txt;
      var countEl = document.getElementById('char-count');
      var limit = CTX[currentContext].charLimit;
      if (limit) {
        countEl.textContent = txt.length + ' / ' + limit.toLocaleString('fr-FR') + ' caractères';
        countEl.style.display = '';
        if (txt.length > limit) {
          countEl.style.color = '#dc2626'; countEl.style.background = '#fef2f2';
        } else {
          countEl.style.color = '#16a34a'; countEl.style.background = '#f0fdf4';
        }
      } else {
        countEl.style.display = 'none';
      }
      document.getElementById('output-zone').classList.add('visible');
      document.getElementById('output-zone').scrollIntoView({ behavior: 'smooth' });
    }

    /* ── Actions ── */
    function copierLettre() {
      var txt = document.getElementById('letter-output').textContent;
      navigator.clipboard.writeText(txt).then(function() { alert('Lettre copiée dans le presse-papiers !'); });
    }

    function telechargerTxt() {
      var txt = document.getElementById('letter-output').textContent;
      var blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = CTX[currentContext].fileName + '.txt';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function telechargerWord() {
      var txt = document.getElementById('letter-output').textContent;
      var paragraphs = txt.split('\n\n').filter(function(p) { return p.trim(); });
      var body = '';
      for (var i = 0; i < paragraphs.length; i++) {
        var lines = paragraphs[i].split('\n');
        for (var j = 0; j < lines.length; j++) {
          body += '<p style="font-family:Calibri,sans-serif;font-size:11pt;line-height:1.6;margin:0 0 6pt 0;">' +
            lines[j].replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</p>';
        }
        body += '<p style="font-size:11pt;margin:0 0 6pt 0;">&nbsp;</p>';
      }
      var html = '<html xmlns:o="urn:schemas-microsoft-com:office:office" ' +
        'xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">' +
        '<head><meta charset="utf-8"><style>@page{margin:2.5cm;}</style></head>' +
        '<body>' + body + '</body></html>';
      var blob = new Blob([html], { type: 'application/msword' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = CTX[currentContext].fileName + '.doc';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function modifierLettre() {
      document.getElementById('output-zone').classList.remove('visible');
      if (currentMode === 'guided') goToStep(1);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ── Initialisation ── */
    switchContext('parcoursup');
  </script>

</body>
</html>
