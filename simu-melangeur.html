<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation - Mélangeur RVB</title>
    <style>
        /* CSS de la simulation */
        body { font-family: sans-serif; text-align: center; background-color: #f0f0f0; margin: 0; padding: 20px; }
        .sim-container { max-width: 400px; margin: 20px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #color-box { width: 100%; height: 150px; border-radius: 8px; border: 2px solid #ddd; margin-bottom: 20px; background-color: rgb(127, 127, 127); }
        .control-group { margin-bottom: 15px; text-align: left; }
        label { display: inline-block; width: 80px; font-weight: bold; }
        input[type=range] { width: 200px; vertical-align: middle; }
        .val-display { font-family: monospace; margin-left: 10px; color: #666; }
        .btn-retour { display: inline-block; margin-top: 20px; text-decoration: none; color: #2ea44f; font-weight: bold; border: 2px solid #2ea44f; padding: 8px 15px; border-radius: 5px;}
        .btn-retour:hover { background: #2ea44f; color: white;}
    </style>
</head>
<body>
    <div class="sim-container">
        <h2>Mélangeur de couleurs (RVB)</h2>
        <p>Ajustez les curseurs pour créer votre couleur.</p>
        
        <div id="color-box"></div>

        <div class="control-group">
            <label style="color:red;">Rouge :</label>
            <input type="range" id="red" min="0" max="255" value="127" oninput="updateColor()">
            <span id="red-val" class="val-display">127</span>
        </div>
        <div class="control-group">
            <label style="color:green;">Vert :</label>
            <input type="range" id="green" min="0" max="255" value="127" oninput="updateColor()">
            <span id="green-val" class="val-display">127</span>
        </div>
        <div class="control-group">
            <label style="color:blue;">Bleu :</label>
            <input type="range" id="blue" min="0" max="255" value="127" oninput="updateColor()">
            <span id="blue-val" class="val-display">127</span>
        </div>

        <a href="simulations.html" class="btn-retour">← Retour à la galerie</a>
    </div>

    <script>
        // JavaScript de la simulation
        function updateColor() {
            // 1. Récupérer les valeurs des sliders
            let r = document.getElementById('red').value;
            let g = document.getElementById('green').value;
            let b = document.getElementById('blue').value;

            // 2. Mettre à jour l'affichage des chiffres
            document.getElementById('red-val').innerText = r;
            document.getElementById('green-val').innerText = g;
            document.getElementById('blue-val').innerText = b;

            // 3. Changer la couleur du carré
            let colorBox = document.getElementById('color-box');
            colorBox.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
        }
        // Initialiser au chargement
        updateColor();
    </script>
<script src="nav.js"></script>
</body>
</html>
